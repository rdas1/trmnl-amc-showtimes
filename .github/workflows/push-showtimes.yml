name: Push AMC Harlem showtimes to TRMNL

on:
  workflow_dispatch:
  schedule:
    # Run at 7am, noon, 5pm, 9pm EDT every day
    - cron: "0 11,16,21,1 * * *"

jobs:
  push-showtimes:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: node scripts/pushShowtimes.js
        env:
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}